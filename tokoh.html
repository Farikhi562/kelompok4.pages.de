<!DOCTYPE html>
<html lang="id" data-theme="dark">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Historiografi | Kelompok IV</title>
    <meta name="description" content="Dashboard interaktif tokoh-tokoh filsuf Islam — Kelompok IV. Powered by NEXA Architecture.">
    <meta name="theme-color" content="#064e3b">

    <link rel="preconnect" href="https://fonts.googleapis.com">
    <link rel="preconnect" href="https://fonts.gstatic.com" crossorigin>
    <link href="https://fonts.googleapis.com/css2?family=Amiri:ital,wght@0,400;0,700;1,400&family=Poppins:wght@300;400;500;600;800&family=Space+Mono:wght@400;700&family=Cinzel:wght@700;900&display=swap" rel="stylesheet">
    <link rel="stylesheet" href="https://cdnjs.cloudflare.com/ajax/libs/font-awesome/6.4.0/css/all.min.css">

    <style>
        /* ==========================================================================
           1. NEXA CORE DESIGN SYSTEM & CSS VARIABLES
           ========================================================================== */
        :root {
            --bg-base: #f8fafc;
            --bg-base-rgb: 248,250,252;
            --text-main: #0f172a;
            --text-muted: #64748b;
            --card-glass: rgba(255, 255, 255, 0.85);
            --border-glass: rgba(255, 255, 255, 0.6);
            --dyn-color-1: #064e3b;
            --dyn-color-2: #047857;
            --accent: #d97706;
            --shadow-card: 0 15px 35px -5px rgba(0,0,0,0.08);
            --shadow-glow: 0 0 25px rgba(6, 78, 59, 0.2);
            --transition-theme: 0.5s cubic-bezier(0.4, 0, 0.2, 1);
            --radius-xl: 24px;
            --radius-lg: 16px;
            
            /* Font Stacks */
            --font-serif: 'Cinzel', serif;
            --font-sans: 'Poppins', sans-serif;
            --font-mono: 'Space Mono', monospace;
            --font-arab: 'Amiri', serif;
        }

        [data-theme="dark"] {
            --bg-base: #020617;
            --bg-base-rgb: 2,6,23;
            --text-main: #f8fafc;
            --text-muted: #94a3b8;
            --card-glass: rgba(15, 23, 42, 0.85);
            --border-glass: rgba(255, 255, 255, 0.1);
            --shadow-card: 0 15px 35px -5px rgba(0,0,0,0.5);
            --shadow-glow: 0 0 35px rgba(6, 78, 59, 0.4);
        }

        /* ==========================================================================
           2. RESET & GLOBAL TYPOGRAPHY (RESPONSIVE CLAMPING)
           ========================================================================== */
        *, *::before, *::after { margin: 0; padding: 0; box-sizing: border-box; }

        body {
            font-family: var(--font-sans);
            background: var(--bg-base);
            color: var(--text-main);
            overflow-x: hidden;
            transition: background var(--transition-theme), color var(--transition-theme);
            -webkit-font-smoothing: antialiased;
            -moz-osx-font-smoothing: grayscale;
        }

        /* Custom Scrollbar for robust UI */
        ::-webkit-scrollbar { width: 6px; }
        ::-webkit-scrollbar-track { background: transparent; }
        ::-webkit-scrollbar-thumb { background: var(--text-muted); border-radius: 10px; opacity: 0.5; }
        ::-webkit-scrollbar-thumb:hover { background: var(--dyn-color-1); }

        /* ==========================================================================
           3. BACKGROUND PHYSICS LAYER
           ========================================================================== */
        .bg-morph {
            position: fixed; inset: 0; z-index: -2;
            background: radial-gradient(circle at var(--mx, 20%) var(--my, 20%), var(--dyn-color-1) 0%, transparent 50%),
                        radial-gradient(circle at calc(100% - var(--mx, 80%)) calc(100% - var(--my, 80%)), var(--dyn-color-2) 0%, transparent 50%);
            opacity: 0.12; transition: opacity 1s ease; will-change: background;
        }
        [data-theme="dark"] .bg-morph { opacity: 0.2; }
        #particle-canvas { position: fixed; inset: 0; z-index: -1; pointer-events: none; }

        /* ==========================================================================
           4. SYSTEM CONTROLS (FLOATING)
           ========================================================================== */
        .system-controls { position: fixed; top: 20px; right: 20px; z-index: 9000; display: flex; gap: 10px; }
        .btn-float {
            width: 42px; height: 42px; border-radius: 50%;
            background: var(--card-glass); border: 1px solid var(--border-glass);
            backdrop-filter: blur(15px); -webkit-backdrop-filter: blur(15px);
            display: flex; align-items: center; justify-content: center;
            cursor: pointer; font-size: 1rem; color: var(--text-main);
            box-shadow: var(--shadow-card); transition: all 0.3s ease;
        }
        .btn-float:hover { color: var(--dyn-color-1); border-color: var(--dyn-color-1); box-shadow: var(--shadow-glow); }

        .toast {
            position: fixed; bottom: 30px; left: 50%; transform: translate(-50%, 100px);
            background: var(--text-main); color: var(--bg-base); padding: 12px 24px; border-radius: 30px;
            font-size: 0.85rem; font-weight: 600; z-index: 10001; box-shadow: 0 10px 25px rgba(0,0,0,0.3);
            opacity: 0; transition: all 0.4s cubic-bezier(0.175, 0.885, 0.32, 1.275); display: flex; align-items: center; gap: 10px; pointer-events: none;
        }
        .toast.show { opacity: 1; transform: translate(-50%, 0); }
        .toast i { color: var(--dyn-color-1); }

        /* ==========================================================================
           5. MAIN DASHBOARD LAYOUT
           ========================================================================== */
        .dashboard-container { 
            display: flex; min-height: 100vh; padding: 40px 20px; 
            max-width: 1500px; margin: 0 auto; gap: 30px;
        }
        @media (max-width: 1024px) { 
            .dashboard-container { flex-direction: column; padding-top: 80px; } 
        }

        /* ==========================================================================
           6. LEFT PANEL: 3D CAROUSEL
           ========================================================================== */
        .carousel-panel {
            flex: 0 0 400px; /* Fixed width for stability */
            position: sticky; top: 40px; height: calc(100vh - 80px);
            display: flex; flex-direction: column; justify-content: center; align-items: center;
            perspective: 1500px;
        }
        @media (max-width: 1024px) { 
            .carousel-panel { flex: none; position: relative; top: 0; height: 500px; width: 100%; } 
        }
        
        .carousel-track { position: relative; width: 280px; height: 400px; transform-style: preserve-3d; }
        
        .tokoh-card {
            position: absolute; width: 100%; height: 100%;
            background: var(--card-glass); border: 1px solid var(--border-glass);
            border-radius: var(--radius-xl); backdrop-filter: blur(20px);
            display: flex; flex-direction: column; align-items: center; justify-content: center; padding: 30px 20px;
            box-shadow: var(--shadow-card); cursor: pointer; text-align: center;
            transition: transform 0.6s cubic-bezier(0.25, 1, 0.5, 1), opacity 0.5s ease, border-color 0.5s ease;
            transform-origin: center center;
        }
        .tokoh-card:not(.active) { opacity: 0.4; }
        .tokoh-card.active { border-color: var(--dyn-color-1); border-width: 2px; }
        
        .tokoh-card img {
            width: 120px; height: 120px; border-radius: 50%; object-fit: cover;
            border: 4px solid var(--bg-base); box-shadow: 0 10px 20px rgba(0,0,0,0.2);
            margin-bottom: 20px; background: var(--text-muted);
        }
        
        /* Clamp implementation for robust card text */
        .tokoh-card h2 { font-family: var(--font-serif); font-size: clamp(1.4rem, 2vw, 1.8rem); margin-bottom: 5px; line-height: 1.1; font-weight: 800; }
        .tokoh-card p { font-family: var(--font-sans); font-size: 0.75rem; color: var(--text-muted); font-weight: 600; text-transform: uppercase; letter-spacing: 1px; }

        .era-badge {
            background: linear-gradient(135deg, var(--dyn-color-1), var(--dyn-color-2)); color: white;
            padding: 4px 12px; border-radius: 12px; font-size: 0.65rem; font-weight: 700;
            letter-spacing: 1px; text-transform: uppercase; margin-bottom: 15px;
        }

        .carousel-controls { margin-top: 30px; display: flex; gap: 15px; z-index: 10; }
        .btn-nav {
            width: 45px; height: 45px; border-radius: 50%; background: var(--card-glass);
            border: 1px solid var(--border-glass); backdrop-filter: blur(15px);
            color: var(--text-main); font-size: 1rem; cursor: pointer;
            display: flex; align-items: center; justify-content: center;
            transition: all 0.2s ease;
        }
        .btn-nav:hover { background: var(--dyn-color-1); color: #fff; border-color: transparent; }
        
        .timeline-minimap {
            width: 100%; max-width: 300px; margin-top: 30px; position: relative; height: 40px;
            display: flex; align-items: center; justify-content: space-between; padding: 0 10px;
        }
        .timeline-line { position: absolute; top: 50%; left: 10px; right: 10px; height: 2px; background: rgba(100,116,139,0.3); transform: translateY(-50%); }
        .timeline-progress {
            position: absolute; top: 50%; left: 10px; height: 4px;
            background: linear-gradient(90deg, var(--dyn-color-1), var(--dyn-color-2));
            transform: translateY(-50%); border-radius: 2px; transition: width 0.4s ease;
        }
        .timeline-dot {
            position: relative; z-index: 2; width: 12px; height: 12px; border-radius: 50%;
            background: var(--bg-base); border: 2px solid var(--text-muted); cursor: pointer; transition: all 0.3s;
        }
        .timeline-dot.active { background: var(--dyn-color-1); border-color: var(--dyn-color-1); transform: scale(1.2); box-shadow: 0 0 8px var(--dyn-color-1); }

        /* ==========================================================================
           7. RIGHT PANEL: GRID DATA SYSTEM
           ========================================================================== */
        .data-panel { 
            flex: 1; display: grid; grid-template-columns: repeat(auto-fit, minmax(320px, 1fr)); 
            gap: 25px; align-content: start; 
        }

        /* Fixed Animation Logic: Ensure smooth render cycle */
        .reveal-box { opacity: 0; transform: translateY(15px); transition: opacity 0.5s ease-out, transform 0.5s ease-out; }
        .reveal-box.visible { opacity: 1; transform: translateY(0); }

        /* General Box Styling */
        .box-component {
            background: var(--card-glass); backdrop-filter: blur(20px); -webkit-backdrop-filter: blur(20px);
            border-radius: var(--radius-lg); padding: 25px; border: 1px solid var(--border-glass);
            box-shadow: var(--shadow-card); display: flex; flex-direction: column;
        }

        /* -- INFO BOX (Span full width) -- */
        .info-box { grid-column: 1 / -1; position: relative; overflow: hidden; }
        .info-box::before { content: ''; position: absolute; top: 0; left: 0; width: 4px; height: 100%; background: linear-gradient(to bottom, var(--dyn-color-1), var(--dyn-color-2)); }

        .bio-header { display: flex; justify-content: space-between; align-items: flex-start; flex-wrap: wrap; gap: 15px; margin-bottom: 20px;}
        
        /* Clamp implementation for Bio Header */
        .bio-title h1 { font-family: var(--font-serif); font-size: clamp(2rem, 4vw, 3rem); color: var(--dyn-color-1); line-height: 1.1; margin-bottom: 4px; transition: color 0.5s; }
        .bio-laqab { font-family: var(--font-arab); font-size: clamp(1rem, 2vw, 1.2rem); color: var(--accent); }
        
        /* Internal Scrolling to prevent overflow */
        .bio-content-wrapper {
            max-height: 220px; /* Force constraint */
            overflow-y: auto; 
            padding-right: 15px;
            margin-bottom: 20px;
        }

        .bio-quote {
            font-style: italic; font-size: clamp(0.9rem, 1.5vw, 1rem); border-left: 2px solid var(--accent); padding-left: 12px;
            margin-bottom: 15px; color: var(--text-muted); font-family: var(--font-serif);
        }

        .bio-text { font-size: clamp(0.85rem, 1.2vw, 0.95rem); line-height: 1.6; color: var(--text-main); text-align: justify; font-weight: 400; }

        .bio-actions { display: flex; gap: 10px; }
        .btn-action {
            display: inline-flex; align-items: center; gap: 8px; padding: 8px 16px; border-radius: 8px;
            background: var(--bg-base); border: 1px solid var(--border-glass); color: var(--text-main);
            font-size: 0.75rem; font-weight: 600; cursor: pointer; transition: all 0.2s ease;
            text-transform: uppercase; letter-spacing: 0.5px;
        }
        .btn-action:hover { background: var(--dyn-color-1); color: #fff; border-color: var(--dyn-color-1); }
        .btn-action.playing { background: var(--dyn-color-2); color: #fff; border-color: transparent;}

        .data-badges { display: flex; gap: 8px; flex-wrap: wrap; margin-top: auto; padding-top: 15px; border-top: 1px dashed var(--border-glass); }
        .data-badge {
            display: inline-flex; align-items: center; gap: 6px; padding: 6px 12px; border-radius: 6px;
            font-size: 0.7rem; font-weight: 700; background: rgba(100,116,139,0.1); color: var(--text-muted); 
            border: 1px solid transparent; text-transform: uppercase;
        }
        .data-badge.book { color: var(--accent); border-color: rgba(217,119,6,0.2); }

        /* -- STATS & RADAR BOXES -- */
        .box-header { 
            font-size: 0.75rem; font-weight: 800; text-transform: uppercase; letter-spacing: 1.5px; 
            color: var(--text-muted); margin-bottom: 20px; display: flex; align-items: center; gap: 8px; 
        }
        .box-header i { color: var(--dyn-color-1); font-size: 1rem; }

        .stat-row { display: flex; align-items: center; gap: 10px; margin-bottom: 12px; }
        .stat-label { width: 85px; font-family: var(--font-mono); font-size: 0.7rem; font-weight: 700; color: var(--text-muted); text-align: right; white-space: nowrap;}
        .stat-track { flex: 1; height: 8px; background: rgba(100,116,139,0.2); border-radius: 4px; overflow: hidden; }
        .stat-fill { height: 100%; border-radius: 4px; background: linear-gradient(90deg, var(--dyn-color-1), var(--dyn-color-2)); transition: width 0.8s ease-out;}
        .stat-value { width: 35px; font-family: var(--font-mono); font-size: 0.75rem; font-weight: 800; color: var(--dyn-color-1); text-align: left;}

        .canvas-container { width: 100%; aspect-ratio: 1; display: flex; justify-content: center; align-items: center;}

        /* -- AI INTERVIEW BOX -- */
        .interview-box { grid-column: 1 / -1; } /* Span full width at bottom */
        .chat-display { 
            height: 220px; background: rgba(var(--bg-base-rgb), 0.5); 
            border-radius: 12px; padding: 15px; overflow-y: auto; display: flex; 
            flex-direction: column; gap: 12px; margin-bottom: 15px; border: 1px solid var(--border-glass); 
        }
        .bubble { 
            max-width: 80%; padding: 10px 15px; border-radius: 12px; font-size: 0.8rem; line-height: 1.5; 
            animation: fadeIn 0.3s ease; 
        }
        .bubble.ai { background: var(--card-glass); color: var(--text-main); align-self: flex-start; border-bottom-left-radius: 2px; border: 1px solid var(--border-glass); }
        .bubble.user { background: var(--dyn-color-1); color: white; align-self: flex-end; border-bottom-right-radius: 2px;}
        
        .chat-options { display: grid; grid-template-columns: repeat(auto-fit, minmax(250px, 1fr)); gap: 10px; }
        .btn-query { 
            background: var(--bg-base); border: 1px solid var(--border-glass); padding: 10px 15px; 
            border-radius: 8px; text-align: left; font-size: 0.75rem; font-weight: 600; cursor: pointer; 
            transition: border-color 0.2s; color: var(--text-main); font-family: var(--font-sans);
        }
        .btn-query:hover { border-color: var(--dyn-color-1); }

        @keyframes fadeIn { from { opacity: 0; transform: translateY(5px); } to { opacity: 1; transform: translateY(0); } }

        /* ==========================================================================
           8. LOADER & TERMINAL (Utility Overlays)
           ========================================================================== */
        .loader-screen {
            position: fixed; inset: 0; z-index: 10000; background: #020617;
            display: flex; flex-direction: column; justify-content: center; align-items: center;
            transition: opacity 0.6s ease, visibility 0.6s ease;
        }
        .loader-screen.hidden { opacity: 0; visibility: hidden; pointer-events: none; }
        .loader-text { margin-top: 20px; font-family: var(--font-mono); font-size: 0.9rem; color: #10b981; letter-spacing: 4px; animation: blink 1s infinite; }
        @keyframes blink { 0%, 100% { opacity: 1; } 50% { opacity: 0.4; } }

        .nexa-terminal {
            position: fixed; bottom: 20px; left: 20px; z-index: 9999;
            width: 300px; max-height: 200px; background: rgba(2, 6, 23, 0.9);
            border: 1px solid var(--dyn-color-2); border-radius: 8px; padding: 10px;
            font-family: var(--font-mono); font-size: 0.65rem; color: #10b981;
            overflow: hidden; backdrop-filter: blur(10px);
            opacity: 0; transition: opacity 0.4s; pointer-events: none;
        }
        .nexa-terminal.active { opacity: 1; }
        .nexa-terminal-log { display: flex; flex-direction: column; gap: 3px; margin-top: 5px; }
        .log-error { color: #ef4444; } .log-success { color: #3b82f6; }
    </style>
</head>
<body>

    <div class="loader-screen" id="loaderScreen">
        <div class="loader-text">NEXA.SYS_BOOTING...</div>
    </div>

    <div class="dashboard-container">
        
        <section class="carousel-panel" id="carouselPanel">
            <div class="carousel-track" id="carouselTrack"></div>
            <div class="carousel-controls">
                <button class="btn-nav" id="prevTokoh"><i class="fa-solid fa-arrow-left"></i></button>

        <section class="data-panel">
            
            <div class="box-component info-box reveal-box">
                <div class="bio-header">
                    <div>
                        <h1 id="nodeName">--</h1>
                        <div class="bio-laqab" id="nodeLaqab">--</div>
                    </div>
                    <div class="bio-actions">
                        <button class="btn-action" id="readBio"><i class="fa-solid fa-play"></i> <span>Audio</span></button>
                        <button class="btn-action" id="shareTokoh"><i class="fa-solid fa-copy"></i> <span>Salin</span></button>
                    </div>
                </div>
                
                <div class="bio-content-wrapper">
                    <div class="bio-quote" id="nodeQuote">"Memuat arsip..."</div>

        </section>

    <div id="toast" class="toast"></div>

    <script>
    /**
     * ==============================================================================
     * NEXA HISTORIOGRAPHY ENGINE v4.2 (STABLE ARCHITECTURE)
     * Architect: Muhamad Fauzan Al Farikhi (NEXA Tech Labs)
     * Focus: Zero Overflow, Race-Condition Prevention, Fluid Responsiveness.
     * ==============================================================================
     */

    // Minimalist System Logger
    const Logger = {
        box: document.getElementById('nexaLogBox'),
        terminal: document.getElementById('nexaTerminal'),
        log(msg, type = 'info') {
            this.terminal.classList.add('active');
            const line = document.createElement('div');
            line.className = type === 'error' ? 'log-error' : type === 'success' ? 'log-success' : '';
            line.innerText = `> ${msg}`;
            this.box.appendChild(line);
            if(this.box.children.length > 5) this.box.removeChild(this.box.firstChild);
            clearTimeout(this.hideTimer);
            this.hideTimer = setTimeout(() => this.terminal.classList.remove('active'), 3000);
        }
    };

    document.addEventListener('DOMContentLoaded', () => {
        Logger.log("Core initialized.", "success");

        const fallbackImg = "https://images.unsplash.com/photo-1584285406059-86ab8e604f14?ixlib=rb-4.0.3&auto=format&fit=crop&w=400&q=80";

        // Full Database (Preserved)
        const Database = [
            {
                id: "alkindi", name: "Al-Kindi", laqab: "Bapak Filsafat Arab",
                era: "Abad 9 M", eraShort: "801–873 M", origin: "Kufah, Irak", book: "Fi al-Falsafah al-Ula",
                colors: ["#0ea5e9", "#0369a1"], img: `assets/images/tokoh/alkindi.jpg`,
                quote: "Kita tidak boleh malu mencari kebenaran dari manapun ia datang.",
                bio: "Abu Yusuf Ya'qub ibn Ishaq as-Sabbah al-Kindi adalah ilmuwan polimatik dan pionir kriptografi. Ia adalah jembatan pertama yang menghubungkan pemikiran Yunani (Aristotelian) dengan dunia Islam. Al-Kindi menegaskan bahwa kebenaran filosofis tidak akan pernah mengkhianati wahyu ilahi, melainkan mengkonfirmasinya melalui jalur akal logis.",
                stats: { Rasional: 88, Metafisika: 85, Sains: 95, Tasawuf: 40, Logika: 90 },
                qna: [
                    { q: "Mengapa filsafat Yunani penting dipelajari?", a: "Kebenaran tidak pernah merendahkan pencarinya. Kita wajib menerimanya dari manapun ia datang." },
                    { q: "Apa definisi Tuhan menurut rasio?", a: "Tuhan adalah 'Yang Esa yang Benar' (Al-Wahid Al-Haqq)." },
                    { q: "Bagaimana hubungan filsafat dan agama?", a: "Tujuan keduanya sama: mengetahui realitas sebenarnya sejauh batas kemampuan manusia." }
                ]
            },
            {
                id: "alfarabi", name: "Al-Farabi", laqab: "Al-Mu'allim Ats-Tsani",
                era: "Abad 10 M", eraShort: "872–950 M", origin: "Farab, Kazakhstan", book: "Al-Madinah Al-Fadhilah",
                colors: ["#8b5cf6", "#5b21b6"], img: `assets/images/tokoh/alfarabi.jpg`,
                quote: "Negara yang ideal dipimpin oleh mereka yang akalnya telah mencapai Akal Aktif.",
                bio: "Dikenal sebagai 'Guru Kedua' setelah Aristoteles. Al-Farabi merancang arsitektur sosiologi dan filsafat politik Islam. Ia meyakini bahwa negara yang ideal (Madinah Fadhilah) harus dipimpin oleh seorang Nabi-Filsuf yang akalnya telah terkoneksi langsung dengan Akal Aktif kosmik.",

        class CoreController {
            constructor(db) {
                this.db = db;
                this.currentIdx = 0;
                this.statsAnimId = null;
                this.animatedStats = {};
                this.isSpeaking = false;
                
                this.initDOM();
                this.bindEvents();
                this.renderCarousel();
                this.updateView();
            }

            initDOM() {
                this.track = document.getElementById('carouselTrack');
                this.timeline = document.getElementById('timelineMinimap'); 
                this.progress = document.getElementById('timelineProgress');
                this.radarCtx = document.getElementById('radarCanvas').getContext('2d');
            }

            bindEvents() {
                document.getElementById('prevTokoh').onclick = () => this.navigate(-1);
                document.getElementById('nextTokoh').onclick = () => this.navigate(1);
                
                document.addEventListener('keydown', (e) => {
                    if(e.key === 'ArrowLeft') this.navigate(-1);
                    if(e.key === 'ArrowRight') this.navigate(1);
                });

                document.getElementById('readBio').onclick = () => this.toggleAudio();
                document.getElementById('shareTokoh').onclick = () => this.shareData();
            }

            navigate(dir) {
                if(this.isSpeaking) window.speechSynthesis.cancel();
                this.currentIdx = (this.currentIdx + dir + this.db.length) % this.db.length;
                this.updateView();
            }

            renderCarousel() {
                this.track.innerHTML = '';
                this.db.forEach((item, i) => {
                    const card = document.createElement('div');
                    card.className = 'tokoh-card';
                    card.innerHTML = `
                        <img src="${item.img}" alt="${item.name}" onerror="this.onerror=null; this.src='${fallbackImg}';">
                        <div class="era-badge" style="background: linear-gradient(135deg, ${item.colors[0]}, ${item.colors[1]})">${item.era}</div>
                        <h2>${item.name}</h2><p>${item.laqab}</p>
                    `;
                    card.onclick = () => { if(this.currentIdx !== i) { this.currentIdx = i; this.updateView(); }};
                    this.track.appendChild(card);

                    const dot = document.createElement('div');
                    dot.className = 'timeline-dot';
                    dot.onclick = () => { this.currentIdx = i; this.updateView(); };
                    this.timeline.appendChild(dot);
                });
            }

            updateView() {
                const data = this.db[this.currentIdx];
                const cards = this.track.children;
                const dots = this.timeline.querySelectorAll('.timeline-dot');

                // Reduced scale to prevent overflow, adjusted Z translation
                for(let i=0; i<cards.length; i++) {
                    const offset = i - this.currentIdx;
                    const abs = Math.abs(offset);
                    const tx = offset * 120;
                    const tz = abs * -150;
                    const scale = 1 - abs * 0.08; 
                    
                    cards[i].style.transform = `translateX(${tx}px) translateZ(${tz}px) scale(${scale})`;
                    cards[i].style.zIndex = 10 - abs;
                    cards[i].classList.toggle('active', offset === 0);
                    if(offset === 0) cards[i].style.borderColor = data.colors[0];
                }

                document.documentElement.style.setProperty('--dyn-color-1', data.colors[0]);
                document.documentElement.style.setProperty('--dyn-color-2', data.colors[1]);

                dots.forEach((d, i) => d.classList.toggle('active', i === this.currentIdx));
                this.progress.style.width = `${(this.currentIdx / (this.db.length - 1)) * 100}%`;

                // Update DOM text content
                document.getElementById('nodeName').innerText = data.name;
                document.getElementById('nodeLaqab').innerText = data.laqab;
                document.getElementById('nodeQuote').innerText = `"${data.quote}"`;
                document.getElementById('nodeText').innerText = data.bio;
                document.getElementById('nodeBook').innerHTML = `<i class="fa-solid fa-book"></i> ${data.book}`;
                document.getElementById('nodeOrigin').innerHTML = `<i class="fa-solid fa-location-dot"></i> ${data.origin}`;
                document.getElementById('nodeEra').innerHTML = `<i class="fa-solid fa-clock"></i> ${data.eraShort}`;

                // Reset wrapper scroll position
                document.querySelector('.bio-content-wrapper').scrollTop = 0;

                this.renderStats(data.stats);
                this.animateRadar(data.stats, data.colors);
                this.buildChat(data);
                this.executeSafeReveal(); // Fixed transition
            }

            renderStats(stats) {
                const container = document.getElementById('statBarsContainer');
                container.innerHTML = '';
                Object.entries(stats).forEach(([key, val]) => {
                    container.innerHTML += `
                        <div class="stat-row">
                            <span class="stat-label">${key}</span>
                            <div class="stat-track"><div class="stat-fill" style="width:0%"></div></div>
                            <span class="stat-value">${val}</span>
                        </div>
                    `;
                });
                
                // Slight delay ensures DOM is painted before applying width
                setTimeout(() => {
                    const fills = container.querySelectorAll('.stat-fill');
                    Object.values(stats).forEach((v, i) => fills[i].style.width = `${v}%`);
                }, 50);
            }

            animateRadar(targetStats, colors) {
                if(this.statsAnimId) cancelAnimationFrame(this.statsAnimId);
                const labels = Object.keys(targetStats);
                const targets = Object.values(targetStats);
                const current = labels.map(l => this.animatedStats[l] || 0);
                const start = performance.now();

                const step = (now) => {
                    const progress = Math.min((now - start) / 500, 1);
                    const ease = 1 - Math.pow(1 - progress, 3);
                    const vals = targets.map((tgt, i) => current[i] + (tgt - current[i]) * ease);
                    labels.forEach((l, i) => this.animatedStats[l] = vals[i]);
                    
                    this.drawRadar(labels, vals, colors);
                    
                    if(progress < 1) this.statsAnimId = requestAnimationFrame(step);
                };
                requestAnimationFrame(step);
            }

            drawRadar(labels, values, colors) {
                const cvs = this.radarCtx.canvas;
                const size = cvs.parentElement.clientWidth;
                const dpr = window.devicePixelRatio || 1;
                cvs.width = size * dpr; cvs.height = size * dpr;
                cvs.style.width = size + 'px'; cvs.style.height = size + 'px';
                
                const ctx = this.radarCtx;
                ctx.scale(dpr, dpr);
                const cx = size/2, cy = size/2, radius = size * 0.35;
                ctx.clearRect(0,0,size,size);

                const isDark = document.documentElement.getAttribute('data-theme') === 'dark';
                
                // Guidelines
                ctx.strokeStyle = isDark ? 'rgba(255,255,255,0.1)' : 'rgba(0,0,0,0.1)'; 
                ctx.lineWidth = 1;
                [0.5, 1].forEach(fac => {
                    ctx.beginPath();
                    labels.forEach((_, i) => {
                        const angle = (Math.PI*2/labels.length)*i - Math.PI/2;
                        ctx[i===0?'moveTo':'lineTo'](cx + Math.cos(angle)*radius*fac, cy + Math.sin(angle)*radius*fac);
                    });
                    ctx.closePath(); ctx.stroke();
                });

                // Spoke lines
                labels.forEach((_, i) => {
                    const angle = (Math.PI*2/labels.length)*i - Math.PI/2;
                    ctx.beginPath(); ctx.moveTo(cx, cy);
                    ctx.lineTo(cx + Math.cos(angle)*radius, cy + Math.sin(angle)*radius); ctx.stroke();
                });

                // Data shape
                ctx.beginPath();
                values.forEach((v, i) => {
                    const angle = (Math.PI*2/labels.length)*i - Math.PI/2;
                    const r = (v/100) * radius;
                    ctx[i===0?'moveTo':'lineTo'](cx + Math.cos(angle)*r, cy + Math.sin(angle)*r);
                });
                ctx.closePath();
                
                const grad = ctx.createRadialGradient(cx, cy, 0, cx, cy, radius);
                grad.addColorStop(0, colors[0] + '80'); 
                grad.addColorStop(1, colors[1] + '20');
                ctx.fillStyle = grad; ctx.fill();
                ctx.strokeStyle = colors[0]; ctx.lineWidth = 2; ctx.stroke();

                // Labels
                ctx.fillStyle = isDark ? '#94a3b8' : '#64748b';
                ctx.font = `bold ${size*0.04}px 'Space Mono', monospace`;
                ctx.textAlign = 'center'; ctx.textBaseline = 'middle';
                labels.forEach((lbl, i) => {
                    const angle = (Math.PI*2/labels.length)*i - Math.PI/2;
                    ctx.fillText(lbl, cx + Math.cos(angle)*(radius + 20), cy + Math.sin(angle)*(radius + 20));
                });
            }

            buildChat(data) {
                const display = document.getElementById('chatDisplay');
                const options = document.getElementById('chatOptions');
                
                display.innerHTML = `<div class="bubble ai">Salam, saya <strong>${data.name}</strong>. Ada yang ingin didiskusikan?</div>`;
                options.innerHTML = '';

                data.qna.forEach(qna => {
                    const btn = document.createElement('button');
                    btn.className = 'btn-query'; 
                    btn.textContent = qna.q;
                    btn.onclick = () => {
                        display.innerHTML += `<div class="bubble user">${qna.q}</div>`;
                        const tid = 'typing-' + Date.now();
                        display.innerHTML += `<div class="bubble ai" id="${tid}">...</div>`;
                        display.scrollTop = display.scrollHeight;
                        
                        setTimeout(() => {
                            document.getElementById(tid).innerHTML = `<em>${data.name}:</em> "${qna.a}"`;
                            display.scrollTop = display.scrollHeight;
                        }, 400);
                    };
                    options.appendChild(btn);
                });
            }

            // Fix for the White Screen/Glitch Issue
            executeSafeReveal() {
                const boxes = document.querySelectorAll('.reveal-box');
                // Remove class synchronously
                boxes.forEach(el => el.classList.remove('visible'));
                
                // Allow browser to calculate layout without the class, then add it back asynchronously
                setTimeout(() => {
                    boxes.forEach(el => el.classList.add('visible'));
                }, 50);
            }

            toggleAudio() {
                const btn = document.getElementById('readBio');
                if(!window.speechSynthesis) return Toast.show("Audio tidak didukung.");
                
                if(this.isSpeaking) {
                    window.speechSynthesis.cancel();
                    this.isSpeaking = false;
                    btn.classList.remove('playing'); btn.querySelector('span').textContent = 'Audio';
                } else {
                    const d = this.db[this.currentIdx];
                    const msg = new SpeechSynthesisUtterance(`${d.name}. ${d.laqab}. ${d.bio}`);
                    msg.lang = 'id-ID'; msg.rate = 1;
                    
                    msg.onend = msg.onerror = () => { 
                        this.isSpeaking = false; 
                        btn.classList.remove('playing'); 
                        btn.querySelector('span').textContent = 'Audio'; 
                    };
                    
                    window.speechSynthesis.speak(msg);
                    this.isSpeaking = true;
                    btn.classList.add('playing'); btn.querySelector('span').textContent = 'Stop';
                }
            }

            shareData() {
                const txt = `Cek data historis ${this.db[this.currentIdx].name} via NEXA Engine.`;
                navigator.clipboard.writeText(txt);
                Toast.show("<i class='fa-solid fa-check'></i> Disalin ke clipboard.");
            }
        }

        // Lightweight Physics Background 
        class CanvasBG {
            constructor() {
                this.c = document.getElementById('particle-canvas');
                this.ctx = this.c.getContext('2d', { alpha: false });
                this.pts = [];
                window.addEventListener('resize', () => this.res());
                this.res(); this.pop(); this.draw();
            }
            res() { this.c.width = window.innerWidth; this.c.height = window.innerHeight; }
            pop() {
                this.pts = [];
                const max = Math.min(Math.floor((this.c.width * this.c.height) / 20000), 80);
                for(let i=0; i<max; i++) {
                    this.pts.push({ x: Math.random()*this.c.width, y: Math.random()*this.c.height, vx: (Math.random()-0.5)*0.8, vy: (Math.random()-0.5)*0.8 });
                }
            }
            draw() {
                const dark = document.documentElement.getAttribute('data-theme') === 'dark';
                this.ctx.fillStyle = dark ? '#020617' : '#f8fafc';
                this.ctx.fillRect(0,0,this.c.width,this.c.height);
                this.ctx.fillStyle = dark ? 'rgba(255,255,255,0.2)' : 'rgba(0,0,0,0.1)';
                
                this.pts.forEach(p => {
                    p.x += p.vx; p.y += p.vy;
                    if(p.x < 0 || p.x > this.c.width) p.vx *= -1;
                    if(p.y < 0 || p.y > this.c.height) p.vy *= -1;
                    this.ctx.beginPath(); this.ctx.arc(p.x, p.y, 1.5, 0, Math.PI*2); this.ctx.fill();
                });
                requestAnimationFrame(() => this.draw());
            }
        }

        const Toast = {
            el: document.getElementById('toast'), t: null,
            show(msg) {
                if(!this.el) return;
                this.el.innerHTML = msg; this.el.classList.add('show');
                clearTimeout(this.t); this.t = setTimeout(() => this.el.classList.remove('show'), 2500);
            }
        };

        const themeBtn = document.getElementById('themeToggle');
        const applyTheme = (isDark) => {
            document.documentElement.setAttribute('data-theme', isDark ? 'dark' : 'light');
            themeBtn.innerHTML = isDark ? '<i class="fa-solid fa-sun"></i>' : '<i class="fa-solid fa-moon"></i>';
            localStorage.setItem('theme', isDark ? 'dark' : 'light');
        };
        
        applyTheme(localStorage.getItem('theme') !== 'light');
        themeBtn.onclick = () => applyTheme(document.documentElement.getAttribute('data-theme') !== 'dark');

        setTimeout(() => document.getElementById('loaderScreen').classList.add('hidden'), 500);

        new CoreController(Database);
        new CanvasBG();
    });
