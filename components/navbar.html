<!DOCTYPE html>
<html lang="id">
<head>
    <meta charset="UTF-8">
    <title>Komponen Navbar (Web Component)</title>
    <style>
        body { background: #0f172a; margin: 0; min-height: 200vh; font-family: 'Poppins', sans-serif; }
        .dummy-content { padding: 120px 5%; color: white; text-align: center; }
    </style>
</head>
<body>

    <k4-navbar current-page="beranda"></k4-navbar>

    <div class="dummy-content">
        <h1>Scroll ke bawah untuk melihat Smart Glassmorphism Navbar</h1>
        <p>Navbar akan menyesuaikan ukuran dan ketebalan blur saat di-scroll.</p>
    </div>

    <script>
        class K4Navbar extends HTMLElement {
            constructor() {
                super();
                this.attachShadow({ mode: 'open' });
            }

            connectedCallback() {
                // Ambil halaman saat ini dari atribut HTML
                const currentPage = this.getAttribute('current-page') || '';

                this.shadowRoot.innerHTML = `
                    <link rel="stylesheet" href="https://cdnjs.cloudflare.com/ajax/libs/font-awesome/6.4.0/css/all.min.css">
                    <style>
                        :host {
                            display: block;
                            position: fixed;
                            top: 0; left: 0; right: 0;
                            z-index: 99990; /* Di bawah Omni-Search tapi di atas segalanya */
                            font-family: 'Poppins', sans-serif;
                            
                            --primary: #10b981;
                            --primary-dark: #064e3b;
                            --accent: #d97706;
                            --bg-glass: rgba(255, 255, 255, 0.7);
                            --text-main: #1e293b;
                            --border-glass: rgba(6, 78, 59, 0.1);
                        }

                        /* Dark Mode Support yang mengambil variabel global jika ada */
                        :host-context([data-theme="dark"]) {
                            --bg-glass: rgba(15, 23, 42, 0.7);
                            --text-main: #f8fafc;
                            --border-glass: rgba(255, 255, 255, 0.1);
                        }

                        .navbar {
                            display: flex;
                            justify-content: space-between;
                            align-items: center;
                            padding: 20px 5%;
                            background: var(--bg-glass);
                            backdrop-filter: blur(10px);
                            -webkit-backdrop-filter: blur(10px);
                            border-bottom: 1px solid var(--border-glass);
                            transition: all 0.4s cubic-bezier(0.4, 0, 0.2, 1);
                        }

                        /* State saat di-scroll */
                        .navbar.scrolled {
                            padding: 10px 5%;
                            background: var(--bg-glass);
                            backdrop-filter: blur(20px);
                            -webkit-backdrop-filter: blur(20px);
                            box-shadow: 0 10px 30px rgba(0,0,0,0.1);
                        }

                        .brand {
                            font-weight: 800;
                            font-size: 1.5rem;
                            color: var(--primary-dark);
                            display: flex;
                            align-items: center;
                            gap: 10px;
                            text-decoration: none;
                            transition: 0.3s;
                        }
                        :host-context([data-theme="dark"]) .brand { color: var(--primary); }
                        .brand:hover { transform: scale(1.05); }

                        /* Menu Navigasi Tengah */
                        .nav-links {
                            display: flex;
                            gap: 30px;
                            list-style: none;
                            margin: 0; padding: 0;
                        }

                        .nav-links a {
                            text-decoration: none;
                            color: var(--text-main);
                            font-weight: 600;
                            font-size: 0.95rem;
                            position: relative;
                            transition: color 0.3s;
                            padding: 5px 0;
                        }

                        .nav-links a::after {
                            content: '';
                            position: absolute;
                            bottom: 0; left: 0;
                            width: 0%; height: 3px;
                            background: var(--accent);
                            border-radius: 2px;
                            transition: width 0.3s ease;
                        }

                        .nav-links a:hover { color: var(--primary); }
                        .nav-links a:hover::after { width: 100%; }

                        /* Menu Aktif */
                        .nav-links a.active { color: var(--primary); }
                        .nav-links a.active::after { width: 100%; background: var(--primary); }

                        /* Kontrol Kanan */
                        .nav-controls {
                            display: flex;
                            gap: 10px;
                            align-items: center;
                        }

                        .btn-icon {
                            width: 40px; height: 40px;
                            border-radius: 50%;
                            background: transparent;
                            border: 1px solid var(--border-glass);
                            color: var(--text-main);
                            display: flex; justify-content: center; align-items: center;
                            cursor: pointer;
                            font-size: 1.1rem;
                            transition: 0.3s;
                        }
                        .btn-icon:hover {
                            background: var(--primary);
                            color: white;
                            border-color: var(--primary);
                            transform: translateY(-3px) rotate(5deg);
                            box-shadow: 0 5px 15px rgba(16, 185, 129, 0.3);
                        }

                        /* Tombol Search Khusus */
                        .btn-search {
                            display: flex;
                            align-items: center;
                            gap: 10px;
                            padding: 8px 15px;
                            border-radius: 20px;
                            background: rgba(0,0,0,0.05);
                            border: 1px solid var(--border-glass);
                            color: var(--text-main);
                            cursor: pointer;
                            font-family: inherit;
                            font-weight: 600;
                            transition: 0.3s;
                        }
                        :host-context([data-theme="dark"]) .btn-search { background: rgba(255,255,255,0.05); }
                        .btn-search:hover { border-color: var(--primary); }
                        .shortcut-key {
                            background: var(--border-glass);
                            padding: 2px 6px;
                            border-radius: 4px;
                            font-size: 0.7rem;
                            font-weight: 800;
                        }

                        /* Hamburger Menu (Mobile) */
                        .btn-mobile {
                            display: none;
                            font-size: 1.5rem;
                            background: none; border: none;
                            color: var(--text-main);
                            cursor: pointer;
                        }

                        /* Mobile Overlay */
                        .mobile-menu {
                            position: fixed;
                            top: 0; left: 0; width: 100%; height: 100vh;
                            background: var(--bg-glass);
                            backdrop-filter: blur(25px);
                            -webkit-backdrop-filter: blur(25px);
                            display: flex;
                            flex-direction: column;
                            justify-content: center;
                            align-items: center;
                            gap: 30px;
                            opacity: 0;
                            visibility: hidden;
                            transition: 0.4s;
                            z-index: 99991;
                        }
                        .mobile-menu.active { opacity: 1; visibility: visible; }
                        
                        .mobile-links { display: flex; flex-direction: column; gap: 20px; text-align: center; }
                        .mobile-links a { font-size: 1.5rem; color: var(--text-main); text-decoration: none; font-weight: 700; }
                        .mobile-links a.active { color: var(--primary); }
                        
                        .btn-close-mobile {
                            position: absolute; top: 25px; right: 5%;
                            background: none; border: none; color: var(--text-main);
                            font-size: 2rem; cursor: pointer;
                        }

                        @media (max-width: 900px) {
                            .nav-links, .btn-search { display: none; }
                            .btn-mobile { display: block; }
                        }
                    </style>

                    <nav class="navbar" id="navbar">
                        <a href="index.html" class="brand">
                            <i class="fa-solid fa-kaaba"></i> Kelompok IV
                        </a>

                        <ul class="nav-links">
                            <li><a href="index.html" class="${currentPage === 'beranda' ? 'active' : ''}">Beranda</a></li>
                            <li><a href="tim.html" class="${currentPage === 'tim' ? 'active' : ''}">Tim Kami</a></li>
                            <li><a href="tokoh.html" class="${currentPage === 'tokoh' ? 'active' : ''}">Tokoh</a></li>
                            <li><a href="timeline.html" class="${currentPage === 'timeline' ? 'active' : ''}">Garis Waktu</a></li>
                            <li><a href="kuis.html" class="${currentPage === 'kuis' ? 'active' : ''}">Kuis</a></li>
                        </ul>

                        <div class="nav-controls">
                            <button class="btn-search" id="btnSearchTrigger" title="Cari Cepat">
                                <i class="fa-solid fa-magnifying-glass"></i> Cari <span class="shortcut-key">Ctrl+K</span>
                            </button>
                            <button class="btn-icon" id="themeToggle" title="Ganti Tema">
                                <i class="fa-solid fa-circle-half-stroke"></i>
                            </button>
                            <button class="btn-mobile" id="btnMobileToggle">
                                <i class="fa-solid fa-bars-staggered"></i>
                            </button>
                        </div>
                    </nav>

                    <div class="mobile-menu" id="mobileMenu">
                        <button class="btn-close-mobile" id="btnCloseMobile"><i class="fa-solid fa-xmark"></i></button>
                        <div class="mobile-links">
                            <a href="index.html" class="${currentPage === 'beranda' ? 'active' : ''}">Beranda</a>
                            <a href="tim.html" class="${currentPage === 'tim' ? 'active' : ''}">Tim Kami</a>
                            <a href="tokoh.html" class="${currentPage === 'tokoh' ? 'active' : ''}">Ensiklopedia Tokoh</a>
                            <a href="timeline.html" class="${currentPage === 'timeline' ? 'active' : ''}">Garis Waktu</a>
                            <a href="kuis.html" class="${currentPage === 'kuis' ? 'active' : ''}">Kuis Interaktif</a>
                        </div>
                        <button class="btn-search" id="btnSearchMobile" style="display:flex; margin-top:20px;">
                            <i class="fa-solid fa-magnifying-glass"></i> Buka Pencarian
                        </button>
                    </div>
                `;

                this.initLogic();
            }

            initLogic() {
                const navbar = this.shadowRoot.getElementById('navbar');
                const btnMobileToggle = this.shadowRoot.getElementById('btnMobileToggle');
                const btnCloseMobile = this.shadowRoot.getElementById('btnCloseMobile');
                const mobileMenu = this.shadowRoot.getElementById('mobileMenu');
                const themeToggle = this.shadowRoot.getElementById('themeToggle');
                const btnSearchTrigger = this.shadowRoot.getElementById('btnSearchTrigger');
                const btnSearchMobile = this.shadowRoot.getElementById('btnSearchMobile');

                // 1. Smart Scroll Effect (Mengecil & Blur Menebal saat Scroll)
                window.addEventListener('scroll', () => {
                    if (window.scrollY > 50) {
                        navbar.classList.add('scrolled');
                    } else {
                        navbar.classList.remove('scrolled');
                    }
                });

                // 2. Mobile Menu Toggle
                btnMobileToggle.addEventListener('click', () => mobileMenu.classList.add('active'));
                btnCloseMobile.addEventListener('click', () => mobileMenu.classList.remove('active'));

                // 3. Integrasi Theme Toggle (Mengubah Atribut di Light DOM)
                themeToggle.addEventListener('click', () => {
                    // Karena ini di Shadow DOM, kita harus akses document luar (Light DOM)
                    const currentTheme = document.documentElement.getAttribute('data-theme') || 'light';
                    const newTheme = currentTheme === 'light' ? 'dark' : 'light';
                    document.documentElement.setAttribute('data-theme', newTheme);
                    localStorage.setItem('k4_theme', newTheme);
                    
                    // Trigger custom event agar core.js atau script lain tahu
                    window.dispatchEvent(new Event('themeChanged'));
                });

                // 4. Integrasi Omni-Search (Memicu search.js)
                const triggerSearch = () => {
                    if (typeof GlobalSearch !== 'undefined') {
                        mobileMenu.classList.remove('active'); // Tutup mobile menu jika terbuka
                        GlobalSearch.open();
                    } else {
                        alert("Mesin pencari sedang dimuat...");
                    }
                };

                btnSearchTrigger.addEventListener('click', triggerSearch);
                btnSearchMobile.addEventListener('click', triggerSearch);
            }
        }

        // Mendaftarkan Custom Element ke Browser
        customElements.define('k4-navbar', K4Navbar);
    </script>
</body>
</html>
